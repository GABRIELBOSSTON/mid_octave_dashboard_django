{% extends 'octave_app/base.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="fw-bold text-center mb-3">Forgot Password?</h4>
                <p class="text-muted text-center" style="font-size:0.9rem;">Enter your email address and we'll send you a link to reset your password.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email Address</label>
                        {{ form.email }}
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Send Reset Link</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
