{% extends 'octave_app/base.html' %}
{% block title %}Password Reset Complete{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 text-center">
        <div class="card shadow-sm p-4">
            <i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i>
            <h4 class="fw-bold mt-3">Password Changed!</h4>
            <p class="text-muted">Your password has been set. You may go ahead and log in now.</p>
            <a href="{% url 'login' %}" class="btn btn-primary mt-2">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
