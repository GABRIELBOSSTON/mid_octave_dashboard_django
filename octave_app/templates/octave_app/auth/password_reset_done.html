{% extends 'octave_app/base.html' %}
{% block title %}Email Sent{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 text-center">
        <div class="card shadow-sm p-4">
            <i class="bi bi-envelope-check text-success" style="font-size: 3rem;"></i>
            <h4 class="fw-bold mt-3">Check your email</h4>
            <p class="text-muted">We've emailed you instructions for setting your password, if an account exists with the email you entered.</p>
            <a href="{% url 'login' %}" class="btn btn-outline-secondary mt-2">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
